name: Update OneDrive CK

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Update OneDrive cookie
        env:
          ONEDRIVE_URL: "https://1drv.ms/f/c/57cdf784c4e3e87b/IgDL7QwxSCgKRp94PYqiYImHAVy9WQBnJEnrtLidIeLHcww?e=wGZWjC"
          ONEDRIVE_COOKIE: ${{ secrets.ONEDRIVE_COOKIE }}
        run: |
          python scripts/update_onedrive_ck.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet config.json; then
            echo "No changes."
          else
            git add config.json
            git commit -m "auto update onedrive ck"
            git push
          fi
